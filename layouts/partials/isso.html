<section id="comments" class="comments-section" aria-label="Comments">
  <h2 class="comments-heading">Comments</h2>
  <ol class="comments-list" role="list" tabindex="-1">
    <li class="comments-loading">Loading…</li>
  </ol>
  <p class="comments-error" role="alert" aria-live="polite" hidden></p>
  <form class="comments-form" aria-label="Add a comment">
    <label for="comment-author">Name <span aria-hidden="true">(required)</span></label>
    <input id="comment-author" name="author" type="text" required autocomplete="name" maxlength="200">
    <label for="comment-email">Email <span aria-hidden="true">(optional, not displayed)</span></label>
    <input id="comment-email" name="email" type="email" autocomplete="email">
    <label for="comment-text">Comment <span aria-hidden="true">(required)</span></label>
    <textarea id="comment-text" name="text" required rows="4" maxlength="5000"></textarea>
    <button type="submit">Post comment</button>
  </form>
  <noscript>Please enable JavaScript to view and post comments.</noscript>
</section>
<script src="{{ "/js/comments.js" | relURL }}" defer></script>
