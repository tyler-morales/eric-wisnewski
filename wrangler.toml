# Cloudflare Pages + Functions
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/
compatibility_date = "2026-03-07"

# Required for Pages to use this file (and D1 bindings) in production.
# Hugo outputs to public/ by default.
pages_build_output_dir = "public"

# D1 binding for comments (use same id for local dev or override via CLI)
[[d1_databases]]
binding = "COMMENTS_DB"
database_name = "comments"
database_id = "2d261c98-9706-46f1-81b2-c29d5777bf8a"
