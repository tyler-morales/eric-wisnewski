# When running `hugo server`, baseURL is overridden so links and canonicals stay local.
baseURL = 'http://localhost:1313/'

[params]
  # Cloudflare Turnstile test key (always passes). Use in dev so widget loads on localhost.
  # Set TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA in .dev.vars for wrangler pages dev.
  turnstile_site_key = '1x00000000000000000000AA'
